name: 每日获取雷军粉丝数据

on:
  schedule:
    # 每天北京时间 10:00 运行 (UTC 02:00)
    - cron: "0 2 * * *"
  workflow_dispatch: # 支持手动触发

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  fetch-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch follower data
        env:
          # 微博已改用访客系统自动获取，无需 Cookie
          # 抖音仍需手动提供 Cookie：Settings → Secrets → DOUYIN_COOKIE
          DOUYIN_COOKIE: ${{ secrets.DOUYIN_COOKIE }}
          # 邮件通知：Douyin Cookie 过期时发送邮件
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: python scripts/fetch_data.py

      - name: Verify data file was updated
        run: |
          echo "===== docs/data.json 状态 ====="
          ls -la docs/data.json
          echo "===== 最近 5 条记录 ====="
          python -c "import json; d=json.load(open('docs/data.json',encoding='utf-8')); [print(r) for r in d['records'][-5:]]"

      - name: Commit and push data
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 把所有变更加进暂存区（不局限于 data.json，方便诊断）
          git add -A

          echo "===== git status ====="
          git status
          echo "===== git diff --cached 摘要 ====="
          git diff --cached --stat

          if git diff --cached --quiet; then
            echo "数据无变化，跳过提交"
            exit 0
          fi

          git commit -m "chore: 更新粉丝数据 $(date -u +'%Y-%m-%d')"
          echo "===== git push ====="
          git push
          echo "===== push 完成 ====="
